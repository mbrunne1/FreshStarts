<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skills Translator - FreshStart</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>FreshStart</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="skills-translator.html">Skills Translator</a>
            <a href="mentors.html">Mentors</a>
            <a href="training.html">Training</a>
            <a href="success-stories.html">Success Stories</a>
            <a href="jobs.html">Jobs</a>
            <a href="register.html">Sign Up</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <main>
        <h2>Skills Translator</h2>
        <p>Discover how your experience translates to new industries</p>
        
        <form>
            <label>Current Job Title:</label>
            <input type="text" required placeholder="e.g., Elementary Teacher">
            
            <label>Current Industry:</label>
            <select required>
                <option value="">Select</option>
                <option>Education</option>
                <option>Retail</option>
                <option>Healthcare</option>
                <option>Hospitality</option>
                <option>Manufacturing</option>
            </select>
            
            <label>Target Industry:</label>
            <select required>
                <option value="">Select</option>
                <option>Technology</option>
                <option>Corporate Training</option>
                <option>Consulting</option>
                <option>Nonprofit</option>
            </select>
            
            <button type="submit">Translate My Skills</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 FreshStart</p>
    </footer>
</body>
</html>
