<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - FreshStart</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>FreshStart</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="skills-translator.html">Skills Translator</a>
            <a href="mentors.html">Mentors</a>
            <a href="training.html">Training</a>
            <a href="success-stories.html">Success Stories</a>
            <a href="jobs.html">Jobs</a>
            <a href="register.html">Sign Up</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <main>
        <h2>Create Account</h2>
        
        <form>
            <label>Name:</label>
            <input type="text" required>
            
            <label>Email:</label>
            <input type="email" required>
            
            <label>Password:</label>
            <input type="password" required minlength="8">
            
            <label>Age:</label>
            <input type="number" required min="18" max="100">
            
            <label>Industry:</label>
            <select required>
                <option value="">Select</option>
                <option>Education</option>
                <option>Retail</option>
                <option>Healthcare</option>
                <option>Other</option>
            </select>
            
            <button type="submit">Sign Up</button>
        </form>
        
        <p><a href="login.html">Already have an account?</a></p>
    </main>

    <footer>
        <p>&copy; 2026 FreshStart</p>
    </footer>
</body>
</html>
